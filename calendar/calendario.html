<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --ink: #1a1410;
    --ink-light: #6b5f52;
    --today-bg: #1a1410;
    --today-fg: #f5f0e8;
    --sunday: #c0392b;
    --border: #d4c9b8;
    --shadow: rgba(26,20,16,0.10);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    padding: 2rem 1rem;
  }

  .calendar-wrap {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 8px 40px var(--shadow);
    width: 100%;
    max-width: 560px;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.6rem 1.6rem 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .month-label { text-align: center; flex: 1; }

  .month-name {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    text-transform: capitalize;
    cursor: pointer;
    border-radius: 3px;
    padding: 0 0.25rem;
    transition: background 0.13s;
  }
  .month-name:hover { background: var(--border); }

  .year-name {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--ink-light);
    letter-spacing: 0.18em;
    margin-top: 0.3rem;
    cursor: pointer;
    border-radius: 3px;
    padding: 0 0.25rem;
    transition: all 0.13s;
  }
  .year-name:hover { color: var(--ink); background: var(--border); }

  .year-title {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    cursor: pointer;
    border-radius: 3px;
    padding: 0 0.25rem;
    transition: background 0.13s;
  }
  .year-title:hover { background: var(--border); }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--ink);
    cursor: pointer;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* ── MONTH VIEW ── */
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0.8rem 1.4rem 0.3rem;
  }
  .weekday {
    text-align: center;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.10em;
    color: var(--ink-light);
    text-transform: uppercase;
    padding: 0.3rem 0;
  }
  .weekday.sun { color: var(--sunday); }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    padding: 0 1.4rem 1.2rem;
    gap: 2px;
    height: 260px;
  }

  .day {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--ink);
    border-radius: 3px;
    cursor: default;
    transition: background 0.1s;
  }
  .day.sunday { color: var(--sunday); }
  .day.other-month { color: var(--border); }
  .day.today { background: var(--today-bg); color: var(--today-fg) !important; font-weight: 400; }
  .day:not(.other-month):not(.today):hover { background: var(--border); }

  /* ── LUNAR PANEL ── */
  .lunar-panel {
    margin: 0 1.4rem;
    padding: 0.6rem 0.2rem 0.9rem;
    border-top: 1px solid var(--border);
    height: 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-content: start;
    gap: 0;
  }
  .lunar-row {
    display: flex;
    align-items: baseline;
    gap: 0.45rem;
    line-height: 1.85;
  }
  .lunar-emoji { font-size: 0.78rem; }
  .lunar-label { font-size: 0.64rem; color: var(--ink); }
  .lunar-date  { font-size: 0.64rem; color: var(--ink-light); }

  /* ── YEAR VIEW ── */
  .year-view { display: none; padding: 1rem 1.2rem 1.4rem; }
  .year-view.visible { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

  .mini-month {
    cursor: pointer;
    border-radius: 4px;
    padding: 0.4rem 0.3rem;
    transition: background 0.12s;
  }
  .mini-month:hover { background: var(--border); }

  .mini-month-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.76rem;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    margin-bottom: 0.3rem;
    text-transform: capitalize;
  }

  .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }

  .mini-wd {
    text-align: center;
    font-size: 0.40rem;
    color: var(--ink-light);
    text-transform: uppercase;
    padding-bottom: 1px;
  }
  .mini-wd.sun { color: var(--sunday); }

  .mini-day {
    text-align: center;
    font-size: 0.56rem;
    font-weight: 300;
    color: var(--ink);
    padding: 1.5px 0;
    border-radius: 2px;
    line-height: 1.3;
  }
  .mini-day.sunday { color: var(--sunday); }
  .mini-day.other-month { color: var(--border); }
  .mini-day.today { background: var(--today-bg); color: var(--today-fg) !important; font-weight: 400; }

  /* ── FOOTER ── */
  .cal-footer {
    border-top: 1px solid var(--border);
    padding: 0.65rem 1.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .today-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    color: var(--ink-light);
    cursor: pointer;
    text-transform: uppercase;
    padding: 0.25rem 0.5rem;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .today-btn:hover { color: var(--ink); background: var(--border); }
</style>
</head>
<body>

<div class="calendar-wrap">

  <div class="cal-header">
    <button class="nav-btn" id="prev">&#8592;</button>
    <div class="month-label" id="month-label"></div>
    <button class="nav-btn" id="next">&#8594;</button>
  </div>

  <div id="month-view">
    <div class="weekdays">
      <div class="weekday sun">dom</div>
      <div class="weekday">lun</div>
      <div class="weekday">mar</div>
      <div class="weekday">mié</div>
      <div class="weekday">jue</div>
      <div class="weekday">vie</div>
      <div class="weekday">sáb</div>
    </div>
    <div class="days-grid" id="days-grid"></div>
    <div class="lunar-panel" id="lunar-panel"></div>
  </div>

  <div class="year-view" id="year-view"></div>

  <div class="cal-footer">
    <button class="today-btn" id="today-btn">Hoy</button>
  </div>

</div>

<script>
  const MONTHS       = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const MOON_NAMES   = { '🌑':'Nueva','🌓':'Creciente','🌕':'Llena','🌗':'Menguante' };

  const now = new Date();
  let current  = { year: now.getFullYear(), month: now.getMonth() };
  let viewMode = 'month';

  /* ── LUNAR ── */
  function lunarPhase(y, m, d) {
    const ref     = Date.UTC(2000, 0, 6, 18, 14);
    const date    = Date.UTC(y, m, d, 12, 0);
    const SYN     = 29.53058867;
    const diff    = (date - ref) / 86400000;
    return ((diff % SYN) + SYN) % SYN / SYN;
  }
  function lunarEventsForMonth(y, m) {
    const SYN    = 29.53058867;
    const ref    = Date.UTC(2000, 0, 6, 18, 14);
    const days   = new Date(y, m+1, 0).getDate();
    const PHASES = [
      { frac: 0,    emoji: "🌑" },
      { frac: 0.25, emoji: "🌓" },
      { frac: 0.5,  emoji: "🌕" },
      { frac: 0.75, emoji: "🌗" },
    ];
    const out = [];

    function cycleAge(ms) {
      const diff = (ms - ref) / 86400000;
      return ((diff % SYN) + SYN) % SYN;
    }

    for (let d = 1; d <= days; d++) {
      // window: midnight of day d  →  midnight of day d+1 (full 24h)
      const msStart = Date.UTC(y, m, d,   0, 0);
      const msEnd   = Date.UTC(y, m, d+1, 0, 0); // JS Date handles month overflow
      const ageStart = cycleAge(msStart);
      const ageEnd   = cycleAge(msEnd);
      PHASES.forEach(({ frac, emoji }) => {
        const target = frac * SYN;
        let crossed;
        if (ageStart <= ageEnd) {
          crossed = target >= ageStart && target < ageEnd;
        } else {
          crossed = target >= ageStart || target < ageEnd;
        }
        if (crossed) out.push({ day: d, emoji });
      });
    }

    out.sort((a, b) => a.day - b.day);
    return out;
  }

  /* ── HEADER ── */
  function renderHeader() {
    const label = document.getElementById('month-label');
    label.innerHTML = '';

    if (viewMode === 'month') {
      const mn = document.createElement('div');
      mn.className = 'month-name';
      mn.textContent = MONTHS[current.month];
      mn.title = 'Ver año completo';
      mn.addEventListener('click', () => setView('year'));

      const yn = document.createElement('div');
      yn.className = 'year-name';
      yn.textContent = current.year;
      yn.title = 'Ver año completo';
      yn.addEventListener('click', () => setView('year'));

      label.appendChild(mn);
      label.appendChild(yn);
    } else {
      const yt = document.createElement('div');
      yt.className = 'year-title';
      yt.textContent = current.year;
      const isCurrentYear = current.year === now.getFullYear();
      if (isCurrentYear) {
        yt.title = 'Volver al mes actual';
        yt.addEventListener('click', () => { current.month = now.getMonth(); setView('month'); });
      } else {
        yt.title = 'Volver al año actual';
        yt.addEventListener('click', () => { current.year = now.getFullYear(); renderYear(); });
      }
      label.appendChild(yt);
    }
  }

  /* ── MONTH VIEW ── */
  function renderMonth() {
    renderHeader();
    const { year, month } = current;
    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';

    const firstDay    = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const daysInPrev  = new Date(year, month, 0).getDate();
    const isCurrent   = now.getFullYear() === year && now.getMonth() === month;

    for (let cell = 0; cell < 42; cell++) {
      const el  = document.createElement('div');
      el.className = 'day';
      const col = cell % 7;
      let d, yr = year, mo = month;

      if (cell < firstDay) {
        d = daysInPrev - firstDay + 1 + cell;
        mo = month - 1; if (mo < 0)  { mo = 11; yr--; }
        el.classList.add('other-month');
      } else if (cell >= firstDay + daysInMonth) {
        d = cell - firstDay - daysInMonth + 1;
        mo = month + 1; if (mo > 11) { mo = 0; yr++; }
        el.classList.add('other-month');
      } else {
        d = cell - firstDay + 1;
        if (isCurrent && d === now.getDate()) el.classList.add('today');
      }

      if (col === 0) el.classList.add('sunday');
      el.textContent = d;
      grid.appendChild(el);
    }

    // Lunar panel
    const panel = document.getElementById('lunar-panel');
    panel.innerHTML = '';
    lunarEventsForMonth(year, month).forEach(({ day, emoji }) => {
      const row = document.createElement('div');
      row.className = 'lunar-row';
      const eEl = document.createElement('span');
      eEl.className = 'lunar-emoji';
      eEl.textContent = emoji;
      const lEl = document.createElement('span');
      lEl.className = 'lunar-label';
      lEl.textContent = MOON_NAMES[emoji];
      const dEl = document.createElement('span');
      dEl.className = 'lunar-date';
      dEl.textContent = `${day} ${MONTHS_SHORT[month]}`;
      row.appendChild(eEl);
      row.appendChild(lEl);
      row.appendChild(dEl);
      panel.appendChild(row);
    });
  }

  /* ── YEAR VIEW ── */
  function renderYear() {
    renderHeader();
    const { year } = current;
    const container = document.getElementById('year-view');
    container.innerHTML = '';

    for (let m = 0; m < 12; m++) {
      const mini = document.createElement('div');
      mini.className = 'mini-month';
      mini.addEventListener('click', () => {
        current.month = m;
        setView('month');
      });

      const title = document.createElement('div');
      title.className = 'mini-month-name';
      title.textContent = MONTHS_SHORT[m];
      mini.appendChild(title);

      const mg = document.createElement('div');
      mg.className = 'mini-grid';

      ['D','L','M','X','J','V','S'].forEach((wd, i) => {
        const wdEl = document.createElement('div');
        wdEl.className = 'mini-wd' + (i === 0 ? ' sun' : '');
        wdEl.textContent = wd;
        mg.appendChild(wdEl);
      });

      const firstDay    = new Date(year, m, 1).getDay();
      const daysInMonth = new Date(year, m+1, 0).getDate();
      const daysInPrev  = new Date(year, m, 0).getDate();
      const isCurrent   = now.getFullYear() === year && now.getMonth() === m;

      for (let cell = 0; cell < 42; cell++) {
        const el  = document.createElement('div');
        el.className = 'mini-day';
        const col = cell % 7;
        let d;

        if (cell < firstDay) {
          d = daysInPrev - firstDay + 1 + cell;
          el.classList.add('other-month');
        } else if (cell >= firstDay + daysInMonth) {
          d = cell - firstDay - daysInMonth + 1;
          el.classList.add('other-month');
        } else {
          d = cell - firstDay + 1;
          if (isCurrent && d === now.getDate()) el.classList.add('today');
        }

        if (col === 0) el.classList.add('sunday');
        el.textContent = d;
        mg.appendChild(el);
      }

      mini.appendChild(mg);
      container.appendChild(mini);
    }
  }

  /* ── SET VIEW ── */
  function setView(mode) {
    viewMode = mode;
    const monthView = document.getElementById('month-view');
    const yearView  = document.getElementById('year-view');

    if (mode === 'year') {
      monthView.style.display = 'none';
      yearView.classList.add('visible');
      renderYear();
    } else {
      monthView.style.display = '';
      yearView.classList.remove('visible');
      renderMonth();
    }
  }

  /* ── NAV ── */
  /* ── HOLD-TO-REPEAT NAV (logarithmic acceleration) ── */
  function step(dir) {
    if (viewMode === 'month') {
      current.month += dir;
      if (current.month < 0)  { current.month = 11; current.year--; }
      if (current.month > 11) { current.month = 0;  current.year++; }
      renderMonth();
    } else {
      current.year += dir;
      renderYear();
    }
  }

  function setupNav(id, dir) {
    const btn = document.getElementById(id);
    let pressStart = 0, rafId = null, holding = false;

    function tick(ts) {
      if (!holding) return;
      const elapsed = ts - pressStart;
      // logarithmic interval: starts at 400ms, shrinks to ~60ms after ~3s
      const interval = Math.max(60, 400 - 110 * Math.log1p(elapsed / 200));
      rafId = requestAnimationFrame(function loop(ts2) {
        if (!holding) return;
        const el2 = ts2 - pressStart;
        const iv   = Math.max(60, 400 - 110 * Math.log1p(el2 / 200));
        rafId = setTimeout(() => { if (holding) { step(dir); tick(performance.now()); } }, iv);
      });
    }

    btn.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      holding = true;
      pressStart = performance.now();
      step(dir);
      rafId = setTimeout(() => { if (holding) tick(performance.now()); }, 450);
    });
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      holding = true;
      pressStart = performance.now();
      step(dir);
      rafId = setTimeout(() => { if (holding) tick(performance.now()); }, 450);
    }, { passive: false });

    function release() {
      holding = false;
      clearTimeout(rafId);
      cancelAnimationFrame(rafId);
    }
    btn.addEventListener('mouseup',    release);
    btn.addEventListener('mouseleave', release);
    btn.addEventListener('touchend',   release);
    btn.addEventListener('touchcancel',release);
  }

  setupNav('prev', -1);
  setupNav('next', +1);

  document.getElementById('today-btn').addEventListener('click', () => {
    current = { year: now.getFullYear(), month: now.getMonth() };
    setView('month');
  });

  setView('month');
</script>
</body>
</html>
